7\u0435\u0441, \u0420\u0430\u0444\u0430 \u041C\u0430\u0440\u043A\u0435\u0441 (5 \u0427\u041C) \u0438 \u0432\u0440\u0430\u0442\u0430\u0440\u044C \u041E\u0447\u043E\u0430."],\u042E\u0410\u0420:["\u041F\u0440\u0438\u043D\u0438\u043C\u0430\u043B\u0430 \u043F\u0435\u0440\u0432\u044B\u0439 \u0447\u0435\u043C\u043F\u0438\u043E\u043D\u0430\u0442 \u043C\u0438\u0440\u0430 \u0432 \u0410\u0444\u0440\u0438\u043A\u0435 \u2014 2010.","\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xABBafana Bafana\xBB.","\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u041A\u0443\u0431\u043A\u0430 \u0410\u0444\u0440\u0438\u043A\u0438 1996 \u0433\u043E\u0434\u0430 \u0432 \u0440\u043E\u043B\u0438 \u0445\u043E\u0437\u044F\u0435\u0432.","\u0418\u0437\u0432\u0435\u0441\u0442\u043D\u044B\u0435 \u0438\u0433\u0440\u043E\u043A\u0438: \u041B\u0443\u043A\u0430\u0441 \u0420\u0430\u0434\u0435\u0431\u0435, \u0411\u0435\u043D\u043D\u0438 \u041C\u0430\u043A\u043A\u0430\u0440\u0442\u0438."],"\u042E\u0436\u043D\u0430\u044F \u041A\u043E\u0440\u0435\u044F":["\u041F\u043E\u043B\u0443\u0444\u0438\u043D\u0430\u043B \u0427\u041C-2002 \u2014 \u043B\u0443\u0447\u0448\u0438\u0439 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442 \u043A\u043E\u043C\u0430\u043D\u0434\u044B \u0438\u0437 \u0410\u0437\u0438\u0438 \u0432 \u0438\u0441\u0442\u043E\u0440\u0438\u0438.","\u0422\u043E\u0442 \u0442\u0443\u0440\u043D\u0438\u0440 \u043F\u0440\u0438\u043D\u0438\u043C\u0430\u043B\u0430 \u0432\u043C\u0435\u0441\u0442\u0435 \u0441 \u042F\u043F\u043E\u043D\u0438\u0435\u0439.","\u041B\u0438\u0434\u0435\u0440 \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u0438\u0445 \u043B\u0435\u0442 \u2014 \u0421\u043E\u043D \u0425\u044B\u043D \u041C\u0438\u043D.","\u0420\u0435\u0433\u0443\u043B\u044F\u0440\u043D\u043E \u0432\u044B\u0445\u043E\u0434\u0438\u0442 \u0438\u0437 \u0433\u0440\u0443\u043F\u043F\u044B \u043D\u0430 \u0447\u0435\u043C\u043F\u0438\u043E\u043D\u0430\u0442\u0430\u0445 \u043C\u0438\u0440\u0430."],\u0427\u0435\u0445\u0438\u044F:["\u041A\u0430\u043A \u0427\u0435\u0445\u043E\u0441\u043B\u043E\u0432\u0430\u043A\u0438\u044F \u2014 \u0444\u0438\u043D\u0430\u043B\u0438\u0441\u0442 \u0427\u041C 1934 \u0438 1962.","\u0427\u0435\u0445\u043E\u0441\u043B\u043E\u0432\u0430\u043A\u0438\u044F \u0432\u044B\u0438\u0433\u0440\u0430\u043B\u0430 \u0415\u0432\u0440\u043E-1976 (\u0437\u043D\u0430\u043C\u0435\u043D\u0438\u0442\u044B\u0439 \u043F\u0435\u043D\u0430\u043B\u044C\u0442\u0438 \u041F\u0430\u043D\u0435\u043D\u043A\u0438).","\u0427\u0435\u0445\u0438\u044F \u2014 \u0444\u0438\u043D\u0430\u043B\u0438\u0441\u0442 \u0415\u0432\u0440\u043E-1996.","\u0417\u0432\u0451\u0437\u0434\u044B: \u041F\u0430\u0432\u0435\u043B \u041D\u0435\u0434\u0432\u0435\u0434, \u041F\u0435\u0442\u0440 \u0427\u0435\u0445, \u0422\u043E\u043C\u0430\u0448 \u0420\u043E\u0441\u0438\u0446\u043A\u0438."],\u041A\u0430\u043D\u0430\u0434\u0430:["\u0421\u043E-\u0445\u043E\u0437\u044F\u0438\u043D \u0427\u041C-2026 \u0432\u043C\u0435\u0441\u0442\u0435 \u0441 \u0421\u0428\u0410 \u0438 \u041C\u0435\u043A\u0441\u0438\u043A\u043E\u0439.","\u0414\u0435\u0431\u044E\u0442 \u0432 1986-\u043C: \u0442\u0440\u0438 \u043F\u043E\u0440\u0430\u0436\u0435\u043D\u0438\u044F \u0438 \u043D\u0438 \u043E\u0434\u043D\u043E\u0433\u043E \u0433\u043E\u043B\u0430.","\u0412\u0435\u0440\u043D\u0443\u043B\u0430\u0441\u044C \u043D\u0430 \u0427\u041C \u0432 2022-\u043C \u043F\u043E\u0441\u043B\u0435 36-\u043B\u0435\u0442\u043D\u0435\u0433\u043E \u043F\u0435\u0440\u0435\u0440\u044B\u0432\u0430.","\u0417\u0432\u0435\u0437\u0434\u0430 \u2014 \u0410\u043B\u044C\u0444\u043E\u043D\u0441\u043E \u0414\u044D\u0432\u0438\u0441 \u0438\u0437 \xAB\u0411\u0430\u0432\u0430\u0440\u0438\u0438\xBB."],\u041A\u0430\u0442\u0430\u0440:["\u041F\u0440\u0438\u043D\u0438\u043C\u0430\u043B \u0427\u041C-2022 \u2014 \u043F\u0435\u0440\u0432\u044B\u0439 \u043D\u0430 \u0411\u043B\u0438\u0436\u043D\u0435\u043C \u0412\u043E\u0441\u0442\u043E\u043A\u0435.","\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u0410\u0437\u0438\u0438 2019 \u0438 2023 \u0433\u043E\u0434\u043E\u0432.","\u041F\u0435\u0440\u0432\u044B\u0439 \u0445\u043E\u0437\u044F\u0438\u043D, \u043F\u0440\u043E\u0438\u0433\u0440\u0430\u0432\u0448\u0438\u0439 \u043C\u0430\u0442\u0447 \u043E\u0442\u043A\u0440\u044B\u0442\u0438\u044F (2022).","\u0411\u043E\u043C\u0431\u0430\u0440\u0434\u0438\u0440 \u2014 \u0410\u043B\u043C\u043E\u044D\u0437 \u0410\u043B\u0438."],"\u0411\u043E\u0441\u043D\u0438\u044F \u0438 \u0413\u0435\u0440\u0446\u0435\u0433\u043E\u0432\u0438\u043D\u0430":["\u0415\u0434\u0438\u043D\u0441\u0442\u0432\u0435\u043D\u043D\u044B\u0439 \u0427\u041C \u043F\u043E\u043A\u0430 \u2014 2014 \u0433\u043E\u0434.","\u041B\u0443\u0447\u0448\u0438\u0439 \u0431\u043E\u043C\u0431\u0430\u0440\u0434\u0438\u0440 \u0432 \u0438\u0441\u0442\u043E\u0440\u0438\u0438 \u2014 \u042D\u0434\u0438\u043D \u0414\u0436\u0435\u043A\u043E.","\u0421\u0431\u043E\u0440\u043D\u0430\u044F \u043F\u043E\u044F\u0432\u0438\u043B\u0430\u0441\u044C \u043F\u043E\u0441\u043B\u0435 \u0440\u0430\u0441\u043F\u0430\u0434\u0430 \u042E\u0433\u043E\u0441\u043B\u0430\u0432\u0438\u0438.","\u0418\u0437\u0432\u0435\u0441\u0442\u043D\u044B\u0439 \u0438\u0433\u0440\u043E\u043A \u2014 \u041C\u0438\u0440\u043E\u0441\u043B\u0430\u0432 \u041F\u044C\u044F\u043D\u0438\u0447."],\u0428\u0432\u0435\u0439\u0446\u0430\u0440\u0438\u044F:["\u041F\u0440\u0438\u043D\u0438\u043C\u0430\u043B\u0430 \u0427\u041C-1954.","\u0414\u043E\u0445\u043E\u0434\u0438\u043B\u0430 \u0434\u043E \u0447\u0435\u0442\u0432\u0435\u0440\u0442\u044C\u0444\u0438\u043D\u0430\u043B\u043E\u0432 \u0432 1934, 1938 \u0438 1954.","\u0412\u044B\u0431\u0438\u043B\u0430 \u0424\u0440\u0430\u043D\u0446\u0438\u044E \u043F\u043E \u043F\u0435\u043D\u0430\u043B\u044C\u0442\u0438 \u043D\u0430 \u0415\u0432\u0440\u043E-2020.","\u0417\u0432\u0451\u0437\u0434\u044B: \u0413\u0440\u0430\u043D\u0438\u0442 \u0414\u0436\u0430\u043A\u0430, \u0428\u0435\u0440\u0434\u0430\u043D \u0428\u0430\u043A\u0438\u0440\u0438."],\u0411\u0440\u0430\u0437\u0438\u043B\u0438\u044F:["\u0420\u0435\u043A\u043E\u0440\u0434\u0441\u043C\u0435\u043D \u2014 5 \u0442\u0438\u0442\u0443\u043B\u043E\u0432 \u0447\u0435\u043C\u043F\u0438\u043E\u043D\u0430 \u043C\u0438\u0440\u0430 (1958\u20132002).","\u0415\u0434\u0438\u043D\u0441\u0442\u0432\u0435\u043D\u043D\u0430\u044F \u043A\u043E\u043C\u0430\u043D\u0434\u0430, \u0438\u0433\u0440\u0430\u0432\u0448\u0430\u044F \u043D\u0430 \u0432\u0441\u0435\u0445 \u0447\u0435\u043C\u043F\u0438\u043E\u043D\u0430\u0442\u0430\u0445 \u043C\u0438\u0440\u0430.","\u041F\u0435\u043B\u0435 \u2014 \u0442\u0440\u0451\u0445\u043A\u0440\u0430\u0442\u043D\u044B\u0439 \u0447\u0435\u043C\u043F\u0438\u043E\u043D \u043C\u0438\u0440\u0430.","\u041B\u0435\u0433\u0435\u043D\u0434\u044B: \u0420\u043E\u043D\u0430\u043B\u0434\u043E, \u0420\u043E\u043D\u0430\u043B\u0434\u0438\u043D\u044C\u043E, \u041D\u0435\u0439\u043C\u0430\u0440, \u0412\u0438\u043D\u0438\u0441\u0438\u0443\u0441."],\u041C\u0430\u0440\u043E\u043A\u043A\u043E:["\u041F\u043E\u043B\u0443\u0444\u0438\u043D\u0430\u043B \u0427\u041C-2022 \u2014 \u043F\u0435\u0440\u0432\u0430\u044F \u0442\u0430\u043A\u0430\u044F \u043A\u043E\u043C\u0430\u043D\u0434\u0430 \u0438\u0437 \u0410\u0444\u0440\u0438\u043A\u0438 \u0438 \u0430\u0440\u0430\u0431\u0441\u043A\u043E\u0433\u043E \u043C\u0438\u0440\u0430.","\u0412 1986-\u043C \u043F\u0435\u0440\u0432\u043E\u0439 \u0438\u0437 \u0410\u0444\u0440\u0438\u043A\u0438 \u0432\u044B\u0448\u043B\u0430 \u0438\u0437 \u0433\u0440\u0443\u043F\u043F\u044B \u043D\u0430 \u0427\u041C.","\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u0410\u0442\u043B\u0430\u0441\u0441\u043A\u0438\u0435 \u043B\u044C\u0432\u044B\xBB.","\u0417\u0432\u0451\u0437\u0434\u044B: \u0410\u0448\u0440\u0430\u0444 \u0425\u0430\u043A\u0438\u043C\u0438, \u0425\u0430\u043A\u0438\u043C \u0417\u0438\u0435\u0448."],\u0428\u043E\u0442\u043B\u0430\u043D\u0434\u0438\u044F:["\u0421\u044B\u0433\u0440\u0430\u043B\u0430 \u0441\u0430\u043C\u044B\u0439 \u043F\u0435\u0440\u0432\u044B\u0439 \u043E\u0444\u0438\u0446\u0438\u0430\u043B\u044C\u043D\u044B\u0439 \u043C\u0430\u0442\u0447 \u0441\u0431\u043E\u0440\u043D\u044B\u0445 \u2014 \u0441 \u0410\u043D\u0433\u043B\u0438\u0435\u0439 \u0432 1872-\u043C.","\u041D\u0438 \u0440\u0430\u0437\u0443 \u043D\u0435 \u0432\u044B\u0445\u043E\u0434\u0438\u043B\u0430 \u0438\u0437 \u0433\u0440\u0443\u043F\u043F\u044B \u043D\u0430 \u0447\u0435\u043C\u043F\u0438\u043E\u043D\u0430\u0442\u0430\u0445 \u043C\u0438\u0440\u0430.","\u041F\u0440\u0435\u0434\u0430\u043D\u043D\u044B\u0435 \u0431\u043E\u043B\u0435\u043B\u044C\u0449\u0438\u043A\u0438 \u2014 \xAB\u0422\u0430\u0440\u0442\u0430\u043D\u043E\u0432\u0430\u044F \u0430\u0440\u043C\u0438\u044F\xBB.","\u041B\u0435\u0433\u0435\u043D\u0434\u044B: \u041A\u0435\u043D\u043D\u0438 \u0414\u0430\u043B\u0433\u043B\u0438\u0448, \u0414\u0435\u043D\u0438\u0441 \u041B\u043E\u0443."],\u0413\u0430\u0438\u0442\u0438:["\u0415\u0434\u0438\u043D\u0441\u0442\u0432\u0435\u043D\u043D\u044B\u0439 \u043F\u0440\u0435\u0436\u043D\u0438\u0439 \u0427\u041C \u2014 1974 \u0433\u043E\u0434.","\u0421\u0430\u043D\u043E\u043D \u0442\u043E\u0433\u0434\u0430 \u043F\u0440\u0435\u0440\u0432\u0430\u043B \u0440\u0435\u043A\u043E\u0440\u0434\u043D\u0443\u044E \u0441\u0443\u0445\u0443\u044E \u0441\u0435\u0440\u0438\u044E \u0432\u0440\u0430\u0442\u0430\u0440\u044F \u0418\u0442\u0430\u043B\u0438\u0438 \u0414\u0437\u043E\u0444\u0444\u0430.","\u0421\u0431\u043E\u0440\u043D\u0430\u044F \u0441 \u041A\u0430\u0440\u0438\u0431\u043E\u0432.","\u0427\u041C-2026 \u2014 \u0432\u0442\u043E\u0440\u043E\u0435 \u0443\u0447\u0430\u0441\u0442\u0438\u0435 \u0432 \u0438\u0441\u0442\u043E\u0440\u0438\u0438."],\u0421\u0428\u0410:["\u041F\u0440\u0438\u043D\u0438\u043C\u0430\u043B\u0438 \u0427\u041C-1994 \u0438 \u0441\u043D\u043E\u0432\u0430 \u0441\u043E-\u0445\u043E\u0437\u044F\u0435\u0432\u0430 \u0432 2026-\u043C.","\u0411\u0440\u043E\u043D\u0437\u0430 \u0441\u0430\u043C\u043E\u0433\u043E \u043F\u0435\u0440\u0432\u043E\u0433\u043E \u0427\u041C-1930.","\u0412 \u0441\u043E\u0432\u0440\u0435\u043C\u0435\u043D\u043D\u043E\u0441\u0442\u0438 \u043B\u0443\u0447\u0448\u0438\u0439 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442 \u2014 \u0447\u0435\u0442\u0432\u0435\u0440\u0442\u044C\u0444\u0438\u043D\u0430\u043B 2002.","\u041B\u0438\u0434\u0435\u0440 \u2014 \u041A\u0440\u0438\u0441\u0442\u0438\u0430\u043D \u041F\u0443\u043B\u0438\u0448\u0438\u0447."],\u041F\u0430\u0440\u0430\u0433\u0432\u0430\u0439:["\u041B\u0443\u0447\u0448\u0438\u0439 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442 \u2014 \u0447\u0435\u0442\u0432\u0435\u0440\u0442\u044C\u0444\u0438\u043D\u0430\u043B \u0427\u041C-2010.","\u0414\u0432\u0443\u043A\u0440\u0430\u0442\u043D\u044B\u0439 \u043F\u043E\u0431\u0435\u0434\u0438\u0442\u0435\u043B\u044C \u041A\u0443\u0431\u043A\u0430 \u0410\u043C\u0435\u0440\u0438\u043A\u0438.","\u0412\u0440\u0430\u0442\u0430\u0440\u044C \u0427\u0438\u043B\u0430\u0432\u0435\u0440\u0442 \u043F\u0440\u043E\u0441\u043B\u0430\u0432\u0438\u043B\u0441\u044F \u0433\u043E\u043B\u0430\u043C\u0438 \u0441 \u043F\u0435\u043D\u0430\u043B\u044C\u0442\u0438 \u0438 \u0448\u0442\u0440\u0430\u0444\u043D\u044B\u0445.","\u041A\u0440\u0435\u043F\u043A\u0430\u044F, \u043D\u0435\u0443\u0441\u0442\u0443\u043F\u0447\u0438\u0432\u0430\u044F \u043A\u043E\u043C\u0430\u043D\u0434\u0430."],\u0410\u0432\u0441\u0442\u0440\u0430\u043B\u0438\u044F:["\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xABSocceroos\xBB.","\u0421 2006 \u0433\u043E\u0434\u0430 \u0432\u044B\u0441\u0442\u0443\u043F\u0430\u0435\u0442 \u0432 \u0430\u0437\u0438\u0430\u0442\u0441\u043A\u043E\u0439 \u043A\u043E\u043D\u0444\u0435\u0434\u0435\u0440\u0430\u0446\u0438\u0438.","\u041B\u0443\u0447\u0448\u0438\u0439 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442 \u2014 1/8 \u0444\u0438\u043D\u0430\u043B\u0430 (2006 \u0438 2022).","\u0422\u0438\u043C \u041A\u044D\u0445\u0438\u043B\u043B \u2014 \u043B\u0443\u0447\u0448\u0438\u0439 \u0431\u043E\u043C\u0431\u0430\u0440\u0434\u0438\u0440 \u0432 \u0438\u0441\u0442\u043E\u0440\u0438\u0438."],\u0422\u0443\u0440\u0446\u0438\u044F:["\u0411\u0440\u043E\u043D\u0437\u0430 \u0427\u041C-2002 \u2014 \u043B\u0443\u0447\u0448\u0438\u0439 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442.","\u0425\u0430\u043A\u0430\u043D \u0428\u044E\u043A\u044E\u0440 \u0437\u0430\u0431\u0438\u043B \u0442\u043E\u0433\u0434\u0430 \u0441\u0430\u043C\u044B\u0439 \u0431\u044B\u0441\u0442\u0440\u044B\u0439 \u0433\u043E\u043B \u0432 \u0438\u0441\u0442\u043E\u0440\u0438\u0438 \u0427\u041C \u2014 \u043D\u0430 11-\u0439 \u0441\u0435\u043A\u0443\u043D\u0434\u0435.","\u041C\u043E\u043B\u043E\u0434\u044B\u0435 \u0437\u0432\u0451\u0437\u0434\u044B: \u0410\u0440\u0434\u0430 \u0413\u044E\u043B\u0435\u0440, \u041A\u0435\u043D\u0430\u043D \u0419\u044B\u043B\u0434\u044B\u0437.","\xAB\u0413\u0430\u043B\u0430\u0442\u0430\u0441\u0430\u0440\u0430\u0439\xBB \u0432\u044B\u0438\u0433\u0440\u0430\u043B \u041A\u0443\u0431\u043E\u043A \u0423\u0415\u0424\u0410 \u0432 2000-\u043C."],\u0413\u0435\u0440\u043C\u0430\u043D\u0438\u044F:["\u0427\u0435\u0442\u044B\u0440\u0451\u0445\u043A\u0440\u0430\u0442\u043D\u044B\u0439 \u0447\u0435\u043C\u043F\u0438\u043E\u043D \u043C\u0438\u0440\u0430 (1954\u20132014).","\u041C\u0438\u0440\u043E\u0441\u043B\u0430\u0432 \u041A\u043B\u043E\u0437\u0435 \u2014 \u043B\u0443\u0447\u0448\u0438\u0439 \u0431\u043E\u043C\u0431\u0430\u0440\u0434\u0438\u0440 \u0432 \u0438\u0441\u0442\u043E\u0440\u0438\u0438 \u0427\u041C (16 \u0433\u043E\u043B\u043E\u0432).","\u0420\u0435\u043A\u043E\u0440\u0434\u043D\u044B\u0435 8 \u0444\u0438\u043D\u0430\u043B\u043E\u0432 \u0447\u0435\u043C\u043F\u0438\u043E\u043D\u0430\u0442\u043E\u0432 \u043C\u0438\u0440\u0430.","\u0420\u0430\u0437\u0433\u0440\u043E\u043C \u0411\u0440\u0430\u0437\u0438\u043B\u0438\u0438 7:1 \u0432 \u043F\u043E\u043B\u0443\u0444\u0438\u043D\u0430\u043B\u0435 2014-\u0433\u043E."],\u041A\u044E\u0440\u0430\u0441\u0430\u043E:["\u0414\u0435\u0431\u044E\u0442\u0430\u043D\u0442 \u0427\u041C-2026.","\u041E\u0434\u043D\u0430 \u0438\u0437 \u0441\u0430\u043C\u044B\u0445 \u043C\u0430\u043B\u0435\u043D\u044C\u043A\u0438\u0445 \u043F\u043E \u043D\u0430\u0441\u0435\u043B\u0435\u043D\u0438\u044E \u0441\u0442\u0440\u0430\u043D, \u043F\u043E\u043F\u0430\u0432\u0448\u0438\u0445 \u043D\u0430 \u0427\u041C.","\u041A\u0430\u0440\u0438\u0431\u0441\u043A\u0438\u0439 \u043E\u0441\u0442\u0440\u043E\u0432 \u0432 \u0441\u043E\u0441\u0442\u0430\u0432\u0435 \u041A\u043E\u0440\u043E\u043B\u0435\u0432\u0441\u0442\u0432\u0430 \u041D\u0438\u0434\u0435\u0440\u043B\u0430\u043D\u0434\u043E\u0432.","\u0422\u0440\u0435\u043D\u0435\u0440 \u2014 \u043B\u0435\u0433\u0435\u043D\u0434\u0430\u0440\u043D\u044B\u0439 \u0414\u0438\u043A \u0410\u0434\u0432\u043E\u043A\u0430\u0442."],"\u041A\u043E\u0442-\u0434\u2019\u0418\u0432\u0443\u0430\u0440":["\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u0421\u043B\u043E\u043D\u044B\xBB.","\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u041A\u0443\u0431\u043A\u0430 \u0410\u0444\u0440\u0438\u043A\u0438 2015 \u0438 2024 (\u0434\u043E\u043C\u0430).","\u0417\u043E\u043B\u043E\u0442\u043E\u0435 \u043F\u043E\u043A\u043E\u043B\u0435\u043D\u0438\u0435 \u0414\u0438\u0434\u044C\u0435 \u0414\u0440\u043E\u0433\u0431\u0430 \u0438 \u042F\u044F \u0422\u0443\u0440\u0435.","\u0422\u0440\u0438\u0436\u0434\u044B \u0438\u0433\u0440\u0430\u043B \u043D\u0430 \u0427\u041C, \u043F\u043E\u043A\u0430 \u043D\u0435 \u0432\u044B\u0445\u043E\u0434\u044F \u0438\u0437 \u0433\u0440\u0443\u043F\u043F\u044B."],\u042D\u043A\u0432\u0430\u0434\u043E\u0440:["\u041B\u0443\u0447\u0448\u0438\u0439 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442 \u2014 1/8 \u0444\u0438\u043D\u0430\u043B\u0430 \u0427\u041C-2006.","\u0414\u043E\u043C\u0430\u0448\u043D\u0438\u0435 \u043C\u0430\u0442\u0447\u0438 \u0432 \u041A\u0438\u0442\u043E \u043D\u0430 \u0432\u044B\u0441\u043E\u0442\u0435 ~2800 \u043C \u2014 \u0431\u043E\u043B\u044C\u0448\u043E\u0435 \u043F\u0440\u0435\u0438\u043C\u0443\u0449\u0435\u0441\u0442\u0432\u043E.","\u041C\u043E\u043B\u043E\u0434\u0430\u044F \u0437\u0432\u0435\u0437\u0434\u0430 \u2014 \u041C\u043E\u0439\u0441\u0435\u0441 \u041A\u0430\u0439\u0441\u0435\u0434\u043E.","\u042D\u043D\u043D\u0435\u0440 \u0412\u0430\u043B\u0435\u043D\u0441\u0438\u044F \u2014 \u043B\u0443\u0447\u0448\u0438\u0439 \u0431\u043E\u043C\u0431\u0430\u0440\u0434\u0438\u0440 \u0441\u0431\u043E\u0440\u043D\u043E\u0439."],\u041D\u0438\u0434\u0435\u0440\u043B\u0430\u043D\u0434\u044B:["\u0422\u0440\u0438\u0436\u0434\u044B \u0444\u0438\u043D\u0430\u043B\u0438\u0441\u0442 \u0427\u041C (1974, 1978, 2010), \u043D\u043E \u0431\u0435\u0437 \u0442\u0438\u0442\u0443\u043B\u0430.","\u0420\u043E\u0434\u0438\u043D\u0430 \xAB\u0442\u043E\u0442\u0430\u043B\u044C\u043D\u043E\u0433\u043E \u0444\u0443\u0442\u0431\u043E\u043B\u0430\xBB \u0438 \u0419\u043E\u0445\u0430\u043D\u0430 \u041A\u0440\u043E\u0439\u0444\u0444\u0430.","\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u0415\u0432\u0440\u043E\u043F\u044B 1988 \u0433\u043E\u0434\u0430.","\u0417\u0432\u0451\u0437\u0434\u044B: \u0432\u0430\u043D \u0414\u0435\u0439\u043A, \u0432\u0430\u043D \u0411\u0430\u0441\u0442\u0435\u043D, \u0413\u0443\u043B\u043B\u0438\u0442."],\u042F\u043F\u043E\u043D\u0438\u044F:["\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u0421\u0430\u043C\u0443\u0440\u0430\u0438 \u0431\u043B\u044E\xBB.","\u041D\u0430 \u0427\u041C-2022 \u043E\u0431\u044B\u0433\u0440\u0430\u043B\u0430 \u0438 \u0413\u0435\u0440\u043C\u0430\u043D\u0438\u044E, \u0438 \u0418\u0441\u043F\u0430\u043D\u0438\u044E.","\u0420\u0435\u0433\u0443\u043B\u044F\u0440\u043D\u043E \u0434\u043E\u0445\u043E\u0434\u0438\u0442 \u0434\u043E 1/8 \u0444\u0438\u043D\u0430\u043B\u0430.","\u041C\u043D\u043E\u0433\u0438\u0435 \u0438\u0433\u0440\u043E\u043A\u0438 \u0432\u044B\u0441\u0442\u0443\u043F\u0430\u044E\u0442 \u0432 \u0415\u0432\u0440\u043E\u043F\u0435: \u041A\u0443\u0431\u043E, \u041C\u0438\u0442\u043E\u043C\u0430."],\u0428\u0432\u0435\u0446\u0438\u044F:["\u0424\u0438\u043D\u0430\u043B\u0438\u0441\u0442 \u0434\u043E\u043C\u0430\u0448\u043D\u0435\u0433\u043E \u0427\u041C-1958 (\u043F\u0440\u043E\u0438\u0433\u0440\u0430\u043B\u0430 \u0411\u0440\u0430\u0437\u0438\u043B\u0438\u0438 \u0438 \u044E\u043D\u043E\u043C\u0443 \u041F\u0435\u043B\u0435).","\u0411\u0440\u043E\u043D\u0437\u0430 \u0427\u041C-1994.","\u041B\u0435\u0433\u0435\u043D\u0434\u0430 \u2014 \u0417\u043B\u0430\u0442\u0430\u043D \u0418\u0431\u0440\u0430\u0433\u0438\u043C\u043E\u0432\u0438\u0447.","\u0422\u0430\u043A\u0436\u0435 \u0431\u043B\u0438\u0441\u0442\u0430\u043B \u0425\u0435\u043D\u0440\u0438\u043A \u041B\u0430\u0440\u0441\u0441\u043E\u043D."],\u0422\u0443\u043D\u0438\u0441:["\u0412 1978-\u043C \u043F\u0435\u0440\u0432\u043E\u0439 \u0438\u0437 \u0410\u0444\u0440\u0438\u043A\u0438 \u0432\u044B\u0438\u0433\u0440\u0430\u043B\u0430 \u043C\u0430\u0442\u0447 \u043D\u0430 \u0427\u041C.","\u041D\u0430 \u0427\u041C-2022 \u043E\u0431\u044B\u0433\u0440\u0430\u043B\u0430 \u0424\u0440\u0430\u043D\u0446\u0438\u044E.","\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u041A\u0430\u0440\u0444\u0430\u0433\u0435\u043D\u0441\u043A\u0438\u0435 \u043E\u0440\u043B\u044B\xBB.","\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u041A\u0443\u0431\u043A\u0430 \u0410\u0444\u0440\u0438\u043A\u0438 2004 \u0433\u043E\u0434\u0430 \u0434\u043E\u043C\u0430."],\u0411\u0435\u043B\u044C\u0433\u0438\u044F:["\u0411\u0440\u043E\u043D\u0437\u0430 \u0427\u041C-2018 \u2014 \u043B\u0443\u0447\u0448\u0438\u0439 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442.","\xAB\u0417\u043E\u043B\u043E\u0442\u043E\u0435 \u043F\u043E\u043A\u043E\u043B\u0435\u043D\u0438\u0435\xBB: \u0414\u0435 \u0411\u0440\u0451\u0439\u043D\u0435, \u0410\u0437\u0430\u0440, \u041B\u0443\u043A\u0430\u043A\u0443, \u041A\u0443\u0440\u0442\u0443\u0430.","\u041D\u0435\u0441\u043A\u043E\u043B\u044C\u043A\u043E \u043B\u0435\u0442 \u0432\u043E\u0437\u0433\u043B\u0430\u0432\u043B\u044F\u043B\u0430 \u0440\u0435\u0439\u0442\u0438\u043D\u0433 \u0424\u0418\u0424\u0410.","\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u041A\u0440\u0430\u0441\u043D\u044B\u0435 \u0434\u044C\u044F\u0432\u043E\u043B\u044B\xBB."],\u0415\u0433\u0438\u043F\u0435\u0442:["\u0420\u0435\u043A\u043E\u0440\u0434\u043D\u044B\u0435 7 \u0442\u0438\u0442\u0443\u043B\u043E\u0432 \u041A\u0443\u0431\u043A\u0430 \u0410\u0444\u0440\u0438\u043A\u0438.","\u041F\u0435\u0440\u0432\u043E\u0439 \u0438\u0437 \u0410\u0444\u0440\u0438\u043A\u0438 \u0441\u044B\u0433\u0440\u0430\u043B\u0430 \u043D\u0430 \u0427\u041C \u2014 \u0432 1934-\u043C.","\u0421\u0443\u043F\u0435\u0440\u0437\u0432\u0435\u0437\u0434\u0430 \u2014 \u041C\u043E\u0445\u0430\u043C\u0435\u0434 \u0421\u0430\u043B\u0430\u0445.","\u041C\u0435\u0436\u0434\u0443 \u0443\u0447\u0430\u0441\u0442\u0438\u044F\u043C\u0438 \u043D\u0430 \u0427\u041C \u0431\u044B\u0432\u0430\u043B\u0438 \u043E\u0433\u0440\u043E\u043C\u043D\u044B\u0435 \u043F\u0430\u0443\u0437\u044B."],\u0418\u0440\u0430\u043D:["\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xABTeam Melli\xBB.","\u0421\u0435\u043D\u0441\u0430\u0446\u0438\u043E\u043D\u043D\u043E \u043E\u0431\u044B\u0433\u0440\u0430\u043B \u0421\u0428\u0410 \u043D\u0430 \u0427\u041C-1998.","\u0422\u0440\u0451\u0445\u043A\u0440\u0430\u0442\u043D\u044B\u0439 \u0447\u0435\u043C\u043F\u0438\u043E\u043D \u0410\u0437\u0438\u0438 (1968, 1972, 1976).","\u041B\u0438\u0434\u0435\u0440 \u0430\u0442\u0430\u043A\u0438 \u2014 \u041C\u0435\u0445\u0434\u0438 \u0422\u0430\u0440\u0435\u043C\u0438."],"\u041D\u043E\u0432\u0430\u044F \u0417\u0435\u043B\u0430\u043D\u0434\u0438\u044F":["\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xABAll Whites\xBB.","\u041D\u0430 \u0427\u041C-2010 \u0435\u0434\u0438\u043D\u0441\u0442\u0432\u0435\u043D\u043D\u0430\u044F \u043D\u0435 \u043F\u0440\u043E\u0438\u0433\u0440\u0430\u043B\u0430 \u043D\u0438 \u043C\u0430\u0442\u0447\u0430 (3 \u043D\u0438\u0447\u044C\u0438), \u043D\u043E \u0432\u044B\u043B\u0435\u0442\u0435\u043B\u0430.","\u0414\u0435\u0431\u044E\u0442 \u043D\u0430 \u0427\u041C \u2014 1982 \u0433\u043E\u0434.","\u041F\u0440\u0435\u0434\u0441\u0442\u0430\u0432\u043B\u044F\u0435\u0442 \u041E\u043A\u0435\u0430\u043D\u0438\u044E."],\u0418\u0441\u043F\u0430\u043D\u0438\u044F:["\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u043C\u0438\u0440\u0430 2010 \u0433\u043E\u0434\u0430.","\u041F\u043E\u0431\u0435\u0434\u044B \u043D\u0430 \u0415\u0432\u0440\u043E 2008, 2012 \u0438 2024 \u2014 \u044D\u0440\u0430 \xAB\u0442\u0438\u043A\u0438-\u0442\u0430\u043A\u0438\xBB.","\u0418\u043D\u044C\u0435\u0441\u0442\u0430 \u0437\u0430\u0431\u0438\u043B \u043F\u043E\u0431\u0435\u0434\u043D\u044B\u0439 \u0433\u043E\u043B \u0432 \u0444\u0438\u043D\u0430\u043B\u0435 \u0427\u041C-2010.","\u041D\u043E\u0432\u0430\u044F \u0437\u0432\u0435\u0437\u0434\u0430 \u2014 \u041B\u0430\u043C\u0438\u043D \u042F\u043C\u0430\u043B\u044C."],"\u041A\u0430\u0431\u043E-\u0412\u0435\u0440\u0434\u0435":["\u0414\u0435\u0431\u044E\u0442\u0430\u043D\u0442 \u0427\u041C-2026.","\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u0413\u043E\u043B\u0443\u0431\u044B\u0435 \u0430\u043A\u0443\u043B\u044B\xBB.","\u041E\u0441\u0442\u0440\u043E\u0432\u043D\u043E\u0435 \u0433\u043E\u0441\u0443\u0434\u0430\u0440\u0441\u0442\u0432\u043E \u0443 \u0437\u0430\u043F\u0430\u0434\u043D\u043E\u0433\u043E \u043F\u043E\u0431\u0435\u0440\u0435\u0436\u044C\u044F \u0410\u0444\u0440\u0438\u043A\u0438.","\u041F\u0440\u043E\u0433\u0440\u0435\u0441\u0441\u0438\u0440\u0443\u044E\u0449\u0430\u044F \u0441\u0431\u043E\u0440\u043D\u0430\u044F \u2014 \u0434\u043E\u0445\u043E\u0434\u0438\u043B\u0430 \u0434\u043E \u0447\u0435\u0442\u0432\u0435\u0440\u0442\u044C\u0444\u0438\u043D\u0430\u043B\u043E\u0432 \u041A\u0443\u0431\u043A\u0430 \u0410\u0444\u0440\u0438\u043A\u0438."],"\u0421\u0430\u0443\u0434\u043E\u0432\u0441\u043A\u0430\u044F \u0410\u0440\u0430\u0432\u0438\u044F":["\u041D\u0430 \u0427\u041C-2022 \u0441\u0435\u043D\u0441\u0430\u0446\u0438\u043E\u043D\u043D\u043E \u043E\u0431\u044B\u0433\u0440\u0430\u043B\u0430 \u0410\u0440\u0433\u0435\u043D\u0442\u0438\u043D\u0443.","\u0412 1994-\u043C \u0432\u044B\u0448\u043B\u0430 \u0432 1/8 \u2014 \u0437\u043D\u0430\u043C\u0435\u043D\u0438\u0442\u044B\u0439 \u0441\u043E\u043B\u044C\u043D\u044B\u0439 \u0433\u043E\u043B \u0410\u043B\u044C-\u041E\u0432\u0430\u0439\u0440\u0430\u043D\u0430.","\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u0417\u0435\u043B\u0451\u043D\u044B\u0435 \u0441\u043E\u043A\u043E\u043B\u044B\xBB.","\u0422\u0440\u0451\u0445\u043A\u0440\u0430\u0442\u043D\u044B\u0439 \u0447\u0435\u043C\u043F\u0438\u043E\u043D \u0410\u0437\u0438\u0438."],\u0423\u0440\u0443\u0433\u0432\u0430\u0439:["\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u0441\u0430\u043C\u043E\u0433\u043E \u043F\u0435\u0440\u0432\u043E\u0433\u043E \u0427\u041C-1930 (\u0434\u043E\u043C\u0430).","\u0412 1950-\u043C \u0432\u044B\u0438\u0433\u0440\u0430\u043B \xAB\u041C\u0430\u0440\u0430\u043A\u0430\u043D\u0430\u0441\u043E\xBB, \u043E\u0431\u044B\u0433\u0440\u0430\u0432 \u0411\u0440\u0430\u0437\u0438\u043B\u0438\u044E \u0432 \u0411\u0440\u0430\u0437\u0438\u043B\u0438\u0438.","\u0420\u0435\u043A\u043E\u0440\u0434\u0441\u043C\u0435\u043D \u043F\u043E \u0442\u0438\u0442\u0443\u043B\u0430\u043C \u041A\u0443\u0431\u043A\u0430 \u0410\u043C\u0435\u0440\u0438\u043A\u0438.","\u0417\u0432\u0451\u0437\u0434\u044B: \u0421\u0443\u0430\u0440\u0435\u0441, \u0424\u043E\u0440\u043B\u0430\u043D, \u041A\u0430\u0432\u0430\u043D\u0438."],\u0424\u0440\u0430\u043D\u0446\u0438\u044F:["\u0414\u0432\u0443\u043A\u0440\u0430\u0442\u043D\u044B\u0439 \u0447\u0435\u043C\u043F\u0438\u043E\u043D \u043C\u0438\u0440\u0430 \u2014 1998 (\u0434\u043E\u043C\u0430) \u0438 2018.","\u0424\u0438\u043D\u0430\u043B\u0438\u0441\u0442 \u0427\u041C-2022.","\u041B\u0435\u0433\u0435\u043D\u0434\u044B: \u0417\u0438\u0434\u0430\u043D, \u041F\u043B\u0430\u0442\u0438\u043D\u0438, \u0441\u0435\u0439\u0447\u0430\u0441 \u2014 \u041C\u0431\u0430\u043F\u043F\u0435.","\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u0415\u0432\u0440\u043E\u043F\u044B 1984 \u0438 2000."],\u0421\u0435\u043D\u0435\u0433\u0430\u043B:["\u041D\u0430 \u0434\u0435\u0431\u044E\u0442\u043D\u043E\u043C \u0427\u041C-2002 \u043E\u0431\u044B\u0433\u0440\u0430\u043B \u0434\u0435\u0439\u0441\u0442\u0432\u0443\u044E\u0449\u0438\u0445 \u0447\u0435\u043C\u043F\u0438\u043E\u043D\u043E\u0432 \u2014 \u0424\u0440\u0430\u043D\u0446\u0438\u044E.","\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u041A\u0443\u0431\u043A\u0430 \u0410\u0444\u0440\u0438\u043A\u0438 2021 \u0433\u043E\u0434\u0430.","\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u041B\u044C\u0432\u044B \u0422\u0435\u0440\u0430\u043D\u0433\u0438\xBB.","\u0418\u043A\u043E\u043D\u0430 \u2014 \u0421\u0430\u0434\u0438\u043E \u041C\u0430\u043D\u0435."],\u0418\u0440\u0430\u043A:["\u0421\u0435\u043D\u0441\u0430\u0446\u0438\u043E\u043D\u043D\u044B\u0439 \u0447\u0435\u043C\u043F\u0438\u043E\u043D \u0410\u0437\u0438\u0438 2007 \u0433\u043E\u0434\u0430 \u2014 \u043D\u0430 \u0444\u043E\u043D\u0435 \u0432\u043E\u0439\u043D\u044B \u0432 \u0441\u0442\u0440\u0430\u043D\u0435.","\u041F\u0440\u0435\u0436\u043D\u0438\u0439 \u0427\u041C \u0431\u044B\u043B \u043B\u0438\u0448\u044C \u043E\u0434\u043D\u0430\u0436\u0434\u044B \u2014 \u0432 1986-\u043C.","\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u041B\u044C\u0432\u044B \u041C\u0435\u0441\u043E\u043F\u043E\u0442\u0430\u043C\u0438\u0438\xBB.","\u041D\u0430 \u0427\u041C-2026 \u043F\u0440\u043E\u0431\u0438\u043B\u0441\u044F \u043F\u043E\u0441\u043B\u0435\u0434\u043D\u0438\u043C, \u0447\u0435\u0440\u0435\u0437 \u0441\u0442\u044B\u043A\u0438."],\u041D\u043E\u0440\u0432\u0435\u0433\u0438\u044F:["\u0412\u043E\u0437\u0432\u0440\u0430\u0449\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u0427\u041C \u0432\u043F\u0435\u0440\u0432\u044B\u0435 \u0441 1998 \u0433\u043E\u0434\u0430.","\u0422\u043E\u0433\u0434\u0430 \u0441\u0435\u043D\u0441\u0430\u0446\u0438\u043E\u043D\u043D\u043E \u043E\u0431\u044B\u0433\u0440\u0430\u043B\u0430 \u0411\u0440\u0430\u0437\u0438\u043B\u0438\u044E.","\u0421\u0443\u043F\u0435\u0440\u0437\u0432\u0435\u0437\u0434\u0430 \u2014 \u042D\u0440\u043B\u0438\u043D\u0433 \u0425\u043E\u043B\u0430\u043D\u0434.","\u041A\u0430\u043F\u0438\u0442\u0430\u043D \u2014 \u041C\u0430\u0440\u0442\u0438\u043D \u042D\u0434\u0435\u0433\u043E\u0440."],\u0410\u0440\u0433\u0435\u043D\u0442\u0438\u043D\u0430:["\u0414\u0435\u0439\u0441\u0442\u0432\u0443\u044E\u0449\u0438\u0439 \u0447\u0435\u043C\u043F\u0438\u043E\u043D \u043C\u0438\u0440\u0430 (2022).","\u0422\u0440\u0438 \u0442\u0438\u0442\u0443\u043B\u0430 \u0427\u041C: 1978, 1986 \u0438 2022.","\u041C\u0430\u0440\u0430\u0434\u043E\u043D\u0430 \u0432 1986-\u043C \u2014 \xAB\u0440\u0443\u043A\u0430 \u0431\u043E\u0433\u0430\xBB \u0438 \xAB\u0433\u043E\u043B \u0432\u0435\u043A\u0430\xBB.","\u041C\u0435\u0441\u0441\u0438 \u043F\u0440\u0438\u0432\u0451\u043B \u043A\u043E\u043C\u0430\u043D\u0434\u0443 \u043A \u0442\u0438\u0442\u0443\u043B\u0443 \u0432 2022-\u043C."],\u0410\u043B\u0436\u0438\u0440:["\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u041B\u0438\u0441\u044B \u043F\u0443\u0441\u0442\u044B\u043D\u0438\xBB.","\u0412 1982-\u043C \u043E\u0431\u044B\u0433\u0440\u0430\u043B \u0431\u0443\u0434\u0443\u0449\u0438\u0445 \u0444\u0438\u043D\u0430\u043B\u0438\u0441\u0442\u043E\u0432 \u2014 \u0424\u0420\u0413.","\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u041A\u0443\u0431\u043A\u0430 \u0410\u0444\u0440\u0438\u043A\u0438 1990 \u0438 2019.","\u041B\u0443\u0447\u0448\u0438\u0439 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442 \u043D\u0430 \u0427\u041C \u2014 1/8 \u0444\u0438\u043D\u0430\u043B\u0430 2014."],\u0410\u0432\u0441\u0442\u0440\u0438\u044F:["\xAB\u0412\u0443\u043D\u0434\u0435\u0440\u0442\u0438\u043C\xBB 1930-\u0445 \u2014 \u043E\u0434\u043D\u0430 \u0438\u0437 \u0441\u0438\u043B\u044C\u043D\u0435\u0439\u0448\u0438\u0445 \u043A\u043E\u043C\u0430\u043D\u0434 \u044D\u043F\u043E\u0445\u0438.","\u0411\u0440\u043E\u043D\u0437\u0430 \u0427\u041C-1954.","\u041B\u0438\u0434\u0435\u0440 \u043E\u0431\u043E\u0440\u043E\u043D\u044B \u2014 \u0414\u0430\u0432\u0438\u0434 \u0410\u043B\u0430\u0431\u0430.","\u0412\u043E\u0437\u0440\u043E\u0436\u0434\u0435\u043D\u0438\u0435 \u043F\u043E\u0434 \u0440\u0443\u043A\u043E\u0432\u043E\u0434\u0441\u0442\u0432\u043E\u043C \u0420\u0430\u043B\u044C\u0444\u0430 \u0420\u0430\u043D\u0433\u043D\u0438\u043A\u0430."],\u0418\u043E\u0440\u0434\u0430\u043D\u0438\u044F:["\u0414\u0435\u0431\u044E\u0442\u0430\u043D\u0442 \u0427\u041C-2026.","\u0412 2023-\u043C \u0432\u043F\u0435\u0440\u0432\u044B\u0435 \u0434\u043E\u0448\u043B\u0430 \u0434\u043E \u0444\u0438\u043D\u0430\u043B\u0430 \u041A\u0443\u0431\u043A\u0430 \u0410\u0437\u0438\u0438.","\u041F\u0440\u043E\u0437\u0432\u0438\u0449\u0435 \u2014 \xAB\u0410\u043B\u044C-\u041D\u0430\u0448\u0430\u043C\u0430\xBB.","\u0418\u0441\u0442\u043E\u0440\u0438\u0447\u0435\u0441\u043A\u043E\u0435 \u0434\u043E\u0441\u0442\u0438\u0436\u0435\u043D\u0438\u0435 \u0434\u043B\u044F \u0444\u0443\u0442\u0431\u043E\u043B\u0430 \u0441\u0442\u0440\u0430\u043D\u044B."],\u041F\u043E\u0440\u0442\u0443\u0433\u0430\u043B\u0438\u044F:["\u0427\u0435\u043C\u043F\u0438\u043E\u043D \u0415\u0432\u0440\u043E\u043F\u044B 2016 \u0433\u043E\u0434\u0430.","\u0411\u0440\u043E\u043D\u0437\u0430 \u0427\u041C-1966, \u042D\u0439\u0441\u0435\u0431\u0438\u043E \u2014 \u043B\u0443\u0447\u0448\u0438\u0439 \u0431\u043E\u043C\u0431\u0430\u0440\u0434\u0438\u0440 \u0442\u043E\u0433\u043E \u0442\u0443\u0440\u043D\u0438\u0440\u0430.","\u041A\u0440\u0438\u0448\u0442\u0438\u0430\u043D\u0443 \u0420\u043E\u043D\u0430\u043B\u0434\u0443 \u2014 \u043B\u0443\u0447\u0448\u0438\u0439 \u0431\u043E\u043C\u0431\u0430\u0440\u0434\u0438\u0440 \u0432 \u0438\u0441\u0442\u043E\u0440\u0438\u0438 \u0441\u0431\u043E\u0440\u043D\u044B\u0445.","\u0422\u0430\u043A\u0436\u0435 \u0431\u043 <script>
(function(){
  try{
    var mv=document.querySelector('meta[name="app-version"]');
    var cur=mv?mv.content:"";
    if(!cur) return;
    setTimeout(function(){
      fetch(location.pathname + '?cb=' + Date.now(), {cache:'no-store'})
        .then(function(r){return r.ok?r.text():null;})
        .then(function(t){
          if(!t) return;
          var m=t.match(/name="app-version" content="([^"]+)"/);
          var remote=m?m[1]:"";
          if(remote && remote!==cur){
            var k='bali_reloaded_for';
            if(sessionStorage.getItem(k)===remote) return;
            sessionStorage.setItem(k, remote);
            location.replace(location.pathname + '?v=' + encodeURIComponent(remote));
          }
        }).catch(function(){});
    }, 1500);
  }catch(e){}
})();
</script>
